<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>PublicWerx Status</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #71717a; margin-bottom: 24px; }
    .summary {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .pulse {
      width: 10px; height: 10px; border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse.up { background: #22c55e; }
    .pulse.down { background: #ef4444; }
    .summary-text { font-size: 14px; font-weight: 500; }
    .summary-text.up { color: #4ade80; }
    .summary-text.down { color: #fca5a5; }
    .services { display: flex; flex-direction: column; gap: 8px; }
    .service {
      padding: 12px 16px; border-radius: 8px;
      background: #18181b; border: 1px solid #27272a;
    }
    .service-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .service-left { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.up { background: #22c55e; }
    .dot.down { background: #ef4444; }
    .dot.degraded { background: #eab308; }
    .dot.unknown { background: #52525b; }
    .service-name { font-size: 14px; font-weight: 500; }
    .service-slug { font-size: 10px; color: #52525b; font-family: monospace; }
    .service-right { display: flex; align-items: center; gap: 12px; }
    .service-ms { font-size: 12px; color: #71717a; font-family: monospace; }
    .service-ms.slow { color: #facc15; }
    .service-status { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .service-status.up { color: #4ade80; }
    .service-status.down { color: #f87171; }
    .service-status.degraded { color: #facc15; }
    .service-status.unknown { color: #52525b; }
    .service-error {
      font-size: 11px; color: rgba(248,113,113,0.8); font-family: monospace;
      margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dot-grid { display: flex; gap: 1px; align-items: center; }
    .grid-dot {
      width: 6px; height: 12px; border-radius: 2px; opacity: 0.8;
    }
    .grid-dot.up { background: #22c55e; }
    .grid-dot.down { background: #ef4444; }
    .grid-dot.degraded { background: #eab308; }
    .grid-dot.unknown { background: #3f3f46; }
    .checked-at { font-size: 10px; color: #52525b; margin-top: 4px; }
    .footer { margin-top: 32px; text-align: center; font-size: 11px; color: #52525b; }
    .footer a { color: #71717a; text-decoration: none; }
    .footer a:hover { color: #a1a1aa; }
    .loading { text-align: center; padding: 60px 0; color: #71717a; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PublicWerx Status</h1>
    <p class="subtitle">Real-time health of all services — 24h history</p>
    <div id="app"><p class="loading">Loading...</p></div>
    <p class="footer"><a href="https://publicwerx.org">publicwerx.org</a></p>
  </div>
  <script src="status.js"></script>
</body>
</html>
