<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>PublicWerx Status</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #71717a; margin-bottom: 24px; }
    .summary {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;
      border: 1px solid #27272a;
    }
    .summary.all-up { border-color: #166534; background: rgba(22,101,52,0.1); }
    .summary.has-issues { border-color: #991b1b; background: rgba(153,27,27,0.1); }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.up { background: #22c55e; }
    .dot.down { background: #ef4444; }
    .dot.degraded { background: #eab308; }
    .dot.unknown { background: #52525b; }
    .summary-text { font-size: 14px; font-weight: 500; }
    .summary.all-up .summary-text { color: #4ade80; }
    .summary.has-issues .summary-text { color: #fca5a5; }
    .services { display: flex; flex-direction: column; gap: 8px; }
    .service {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-radius: 8px;
      background: #18181b; border: 1px solid #27272a;
    }
    .service-left { display: flex; align-items: center; gap: 10px; }
    .service-name { font-size: 14px; font-weight: 500; }
    .service-right { display: flex; align-items: center; gap: 12px; }
    .service-ms { font-size: 12px; color: #71717a; font-family: monospace; }
    .service-status { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .service-status.up { color: #4ade80; }
    .service-status.down { color: #f87171; }
    .service-status.degraded { color: #facc15; }
    .service-status.unknown { color: #52525b; }
    .footer { margin-top: 32px; text-align: center; font-size: 11px; color: #52525b; }
    .footer a { color: #71717a; text-decoration: none; }
    .footer a:hover { color: #a1a1aa; }
    .loading { text-align: center; padding: 60px 0; color: #71717a; font-size: 14px; }
    .checked-at { font-size: 11px; color: #52525b; margin-top: 12px; text-align: right; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PublicWerx Status</h1>
    <p class="subtitle">Real-time health of all services</p>
    <div id="app"><p class="loading">Loading...</p></div>
    <p class="footer"><a href="https://publicwerx.org">publicwerx.org</a></p>
  </div>
  <script>
    async function load() {
      try {
        const res = await fetch('/api/status/public');
        if (!res.ok) throw new Error();
        const data = await res.json();
        render(data);
      } catch {
        document.getElementById('app').innerHTML = '<p class="loading">Failed to load status</p>';
      }
    }
    function render({ services, checkedAt }) {
      const upCount = services.filter(s => s.status === 'up').length;
      const allUp = upCount === services.length;
      let html = `<div class="summary ${allUp ? 'all-up' : 'has-issues'}">
        <div class="dot ${allUp ? 'up' : 'down'}"></div>
        <span class="summary-text">${allUp ? 'All systems operational' : `${services.length - upCount} service${services.length - upCount > 1 ? 's' : ''} experiencing issues`}</span>
      </div><div class="services">`;
      for (const svc of services) {
        html += `<div class="service">
          <div class="service-left">
            <div class="dot ${svc.status}"></div>
            <span class="service-name">${svc.label}</span>
          </div>
          <div class="service-right">
            ${svc.ms != null ? `<span class="service-ms">${svc.ms}ms</span>` : ''}
            <span class="service-status ${svc.status}">${svc.status}</span>
          </div>
        </div>`;
      }
      html += '</div>';
      if (checkedAt) {
        html += `<p class="checked-at">Last checked: ${new Date(checkedAt + 'Z').toLocaleString()}</p>`;
      }
      document.getElementById('app').innerHTML = html;
    }
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
